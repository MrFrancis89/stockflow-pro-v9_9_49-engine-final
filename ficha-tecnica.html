<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <!-- ANTI-FOUC v9.8.7: aplica tema ANTES do primeiro paint.
       Lê temaEstoque do localStorage — mesma chave usada por main.js/storage.js.
       Deve ser o primeiro <script> do documento, inline, síncrono.
       NÃO pode ser defer/async — precisa bloquear o render para ter efeito. -->
  <script>
  (function() {
    var MAP = { midnight: ['theme-midnight'], arctic: ['theme-arctic','light-mode'], forest: ['theme-forest'] };
    var tema = localStorage.getItem('temaEstoque') || 'escuro';
    var classes = MAP[tema] || [];
    if (classes.length) document.documentElement.classList.add.apply(document.documentElement.classList, classes);
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Ficha Técnica</title>
  <link rel="stylesheet" href="./ft-style.css">
  <link rel="stylesheet" href="./ft-v2-style.css"><!-- V2: IA, Negócio, Variações, Cardápio, Tamanhos, Alertas -->
  <link rel="stylesheet" href="./ft-premium.css"><!-- V2 Premium: glass, spring, tokens, nav pill -->
  <link rel="stylesheet" href="./ft-apple-redesign.css"><!-- Apple Premium redesign: tipografia, cards, modais, nav -->

  <!-- Firebase SDK v10 carregado via ES imports em firebase.js (v9.9.6) -->

  <style>
    /* Nav inferior para 6 abas */
    #ft-nav { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .ft-nav-btn { min-width: 52px; }
    .ft-nav-btn[data-tab="pre"].active  { color: #ffd60a; }
    .ft-nav-btn[data-tab="pre"].active svg { stroke: #ffd60a; }
    /* V2: Modo Negócio */
    .ft-nav-btn[data-tab="neg"].active  { color: #30D158; }
    .ft-nav-btn[data-tab="neg"].active svg { stroke: #30D158; }
  </style>
</head>
<body>

<!-- ══════ Loading ══════ -->
<div id="ft-loading" style="display:flex">
  <div class="ft-loading-icon">🍕</div>
  <div class="ft-loading-text">Carregando Ficha Técnica…</div>
</div>

<!-- ══════ Tela de Login ══════ -->
<div id="ft-login" class="hidden"></div>

<!-- ══════ App ══════ -->
<div id="ft-app" class="hidden">

  <!-- Header — StockFlow Pro branding + Ficha Técnica -->
  <header id="ft-hdr">
    <!-- Botão hambúrguer: abre a sidebar do app pai via postMessage -->
    <button id="ft-btn-sidebar" class="ft-btn-sidebar" type="button"
            aria-label="Abrir menu lateral" aria-expanded="false" aria-controls="sidebar-panel">
      <svg class="ft-sidebar-bars" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" aria-hidden="true">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="ft-hdr-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" class="ft-hdr-logo" aria-hidden="true">
        <defs>
          <linearGradient id="ftLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2979FF"/>
            <stop offset="100%" stop-color="#00E5FF"/>
          </linearGradient>
          <filter id="ftLogoGlow">
            <feGaussianBlur stdDeviation="2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <rect width="120" height="120" rx="26" fill="#0D1B2A"/>
        <rect x="0.5" y="0.5" width="119" height="119" rx="25.5" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
        <path d="M 82 28 C 82 28,88 28,88 38 C 88 50,72 52,60 52 C 48 52,32 54,32 66 C 32 78,38 82,50 82 C 58 82,88 82,88 82"
          fill="none" stroke="url(#ftLogoGrad)" stroke-width="7" stroke-linecap="round" filter="url(#ftLogoGlow)"/>
        <circle cx="88" cy="82" r="5.5" fill="#00E5FF" filter="url(#ftLogoGlow)"/>
        <circle cx="82" cy="28" r="3.5" fill="#2979FF" opacity="0.85"/>
      </svg>
      <div class="ft-hdr-names">
        <span class="ft-hdr-app">StockFlow<span class="ft-hdr-pro">PRO</span></span>
        <span class="ft-hdr-subtitle">Ficha Técnica</span>
      </div>
    </div>
    <div class="ft-hdr-right">
      <button id="ft-sync-btn" title="Status de sincronização" aria-label="Sincronizar dados"></button>
      <button id="ft-user-btn" class="ft-user-btn" style="display:none" title="Perfil" aria-label="Perfil do usuário"></button>
    </div>
  </header>

  <!-- Main content -->
  <main id="ft-main">

    <!-- Ingredientes -->
    <section id="ft-sec-ing" class="ft-section">
      <div class="ft-search-wrap">
        <input id="ft-busca-ing" class="ft-search" type="search"
          placeholder="Buscar ingredientes…" autocomplete="off" autocorrect="off">
      </div>
      <div id="ft-lista-ing"></div>
    </section>

    <!-- Receitas -->
    <section id="ft-sec-rec" class="ft-section">
      <div class="ft-search-wrap">
        <input id="ft-busca-rec" class="ft-search" type="search"
          placeholder="Buscar receitas…" autocomplete="off" autocorrect="off">
      </div>
      <div id="ft-lista-rec"></div>
    </section>

    <!-- Simulador -->
    <section id="ft-sec-sim" class="ft-section">
      <div id="ft-simulador"></div>
    </section>

    <!-- Dashboard -->
    <section id="ft-sec-dash" class="ft-section">
      <div id="ft-dashboard"></div>
    </section>

    <!-- Exportação -->
    <section id="ft-sec-exp" class="ft-section">
      <div id="ft-exportacao"></div>
    </section>

    <!-- Preparo Antecipado -->
    <section id="ft-sec-pre" class="ft-section">
      <div class="ft-search-wrap">
        <input id="ft-busca-pre" class="ft-search" type="search"
          placeholder="Buscar preparos…" autocomplete="off" autocorrect="off">
      </div>
      <div id="ft-preparo"></div>
    </section>

    <!-- Custos Fixos e Variáveis -->
    <section id="ft-sec-gas" class="ft-section">
      <div id="ft-gastos"></div>
    </section>

    <!-- Precificação -->
    <section id="ft-sec-prec" class="ft-section">
      <div id="ft-precificacao"></div>
    </section>

    <!-- V2: Modo Negócio -->
    <section id="ft-sec-neg" class="ft-section">
      <div id="ft-negocio"></div>
    </section>

    <!-- V2: Cardápio Visual (GAP 7) -->
    <section id="ft-sec-car" class="ft-section">
      <div id="ft-cardapio"></div>
    </section>

    <!-- V2: Gestão de Tamanhos (GAP 5) -->
    <section id="ft-sec-tam" class="ft-section">
      <div id="ft-tamanhos"></div>
    </section>

  </main>

  <!-- FAB -->
  <button id="ft-fab" aria-label="Adicionar novo item" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- Nav inferior (6 abas) -->
  <nav id="ft-nav" role="navigation" aria-label="Navegação principal">

    <!-- 1. Receitas — ponto de entrada principal -->
    <button class="ft-nav-btn" data-tab="rec" aria-label="Receitas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="8" y1="13" x2="16" y2="13"/>
        <line x1="8" y1="17" x2="13" y2="17"/>
      </svg>
      <span>Receitas</span>
    </button>

    <!-- 2. Ingredientes — matéria-prima base -->
    <button class="ft-nav-btn" data-tab="ing" aria-label="Ingredientes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C9 2 7 4.2 7 7c0 2 1.1 3.7 2.7 4.5V19a2.3 2.3 0 004.6 0v-7.5C15.9 10.7 17 9 17 7c0-2.8-2.2-5-5-5z"/>
        <line x1="9.5" y1="11" x2="14.5" y2="11"/>
      </svg>
      <span>Ingredientes</span>
    </button>

    <!-- 3. Tamanhos — variações de produto -->
    <button class="ft-nav-btn" data-tab="tam" aria-label="Tamanhos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 20h4M4 20V4M4 4h16M20 4v4M16 20h4M20 20V12M8 20h8M8 20v-6h8v6"/>
      </svg>
      <span>Tamanhos</span>
    </button>

    <!-- 4. Simulador — testa combinações -->
    <button class="ft-nav-btn" data-tab="sim" aria-label="Simulador">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="8" r="3.5"/>
        <circle cx="16" cy="16" r="3.5"/>
        <line x1="10.5" y1="10.5" x2="13.5" y2="13.5"/>
      </svg>
      <span>Simulador</span>
    </button>

    <!-- 5. Preparo — processo de produção -->
    <button class="ft-nav-btn" data-tab="pre" aria-label="Preparo Antecipado">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      <span>Preparo</span>
    </button>

    <!-- 6. Custos — gastos fixos/variáveis -->
    <button class="ft-nav-btn" data-tab="gas" aria-label="Custos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="1" x2="12" y2="23"/>
        <path d="M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/>
      </svg>
      <span>Custos</span>
    </button>

    <!-- 7. Precificação — define preços finais -->
    <button class="ft-nav-btn" data-tab="prec" aria-label="Precificação">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
        <line x1="7" y1="7" x2="7.01" y2="7"/>
      </svg>
      <span>Precificar</span>
    </button>

    <!-- 8. Modo Negócio — visão financeira -->
    <button class="ft-nav-btn" data-tab="neg" aria-label="Modo Negócio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Negócio</span>
    </button>

    <!-- 9. Dashboard — métricas e analytics -->
    <button class="ft-nav-btn" data-tab="dash" aria-label="Dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="8" rx="1.5"/>
        <rect x="14" y="3" width="7" height="4" rx="1.5"/>
        <rect x="14" y="11" width="7" height="10" rx="1.5"/>
        <rect x="3" y="15" width="7" height="6" rx="1.5"/>
      </svg>
      <span>Dashboard</span>
    </button>

    <!-- 10. Cardápio Visual — apresentação do menu -->
    <button class="ft-nav-btn" data-tab="car" aria-label="Cardápio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      <span>Cardápio</span>
    </button>

    <!-- 11. Exportar — saída de dados -->
    <button class="ft-nav-btn" data-tab="exp" aria-label="Exportar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <span>Exportar</span>
    </button>

  </nav>

  <!-- Modal nível 1 -->
  <div id="ft-modal" role="dialog" aria-modal="true">
    <div id="ft-modal-box"></div>
  </div>

  <!-- Modal nível 2 (pickers) -->
  <div id="ft-modal-2" role="dialog" aria-modal="true">
    <div id="ft-modal-2-box"></div>
  </div>

  <!-- Toast -->
  <div id="ft-toast" aria-live="polite" aria-atomic="true"></div>

</div><!-- /ft-app -->

<script type="module" src="./ft-app.js"></script>

<!-- Safety-net: se ft-app.js falhar (erro de módulo, import não resolvido, etc.)
     o #ft-loading ficaria preso. Este script clássico detecta a falha e exibe
     uma mensagem de modo offline em vez de tela branca. -->
<script>
  (function () {
    var TIMEOUT = 8000; // ms — tempo máximo para o app se inicializar
    var timer = setTimeout(function () {
      var loading = document.getElementById('ft-loading');
      var app     = document.getElementById('ft-app');
      var login   = document.getElementById('ft-login');
      // Se o app ainda não apareceu, algo travou antes do DOMContentLoaded
      if (loading && loading.style.display !== 'none') {
        loading.innerHTML =
          '<div style="text-align:center;padding:32px 24px">' +
          '<div style="font-size:40px;margin-bottom:16px">📋</div>' +
          '<div style="font-size:17px;font-weight:700;margin-bottom:8px">Ficha Técnica</div>' +
          '<div style="font-size:14px;opacity:.7">Sem conexão — abrindo modo offline…</div>' +
          '</div>';
        // Tenta acionar o módulo novamente via evento para o ft-app.js capturar
        document.dispatchEvent(new CustomEvent('ft:forceOffline'));
      }
    }, TIMEOUT);
    // Cancela o timer se o app carregar normalmente
    document.addEventListener('ft:appReady', function () { clearTimeout(timer); });
  })();
</script>
</body>
</html>
